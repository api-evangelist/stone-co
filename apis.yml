aid: stone-co
name: Stone Co
description: >-
  Stone Co. (NASDAQ: STNE) is a Brazilian financial services and payment
  technology company headquartered in São Paulo. Stone provides card
  acquiring (POS), digital banking, business management software, and
  credit products to entrepreneurs and small-to-medium businesses across
  more than 5,500 Brazilian cities, and is the fourth-largest acquirer in
  Brazil following its acquisition of Elavon's Brazilian operations. Stone
  operates several developer-facing platforms: Connect Stone (a POS
  integration API for in-store payment automation and "infinite shelf"
  omnichannel inventory), Stone Open Banking (a RESTful banking API for
  account, balance, TED, PIX, and payment-link operations against Stone
  accounts and consented third-party accounts), the Stone SDK Android (for
  embedding card-present payments into Android apps and Pinpad/POS
  devices), AutoTEF (PIN-pad-based self-service TEF integration), the
  Conciliação Stone XML reconciliation feed, and Pagar.me (Stone's
  online/PSP gateway covering orders, charges, customers, subscriptions,
  split payments, recurring billing, tokenization, and 3DS). Authentication
  is OAuth2 / PEM-keyed JWT for Open Banking and API-key / credential-based
  for the other surfaces. Onboarding for Open Banking and Connect Stone
  partners is gated through Stone's partnerships team; Pagar.me and the
  Android SDK are self-service. Documentation is primarily in Portuguese
  and concentrated at docs.stone.com.br, docs.openbank.stone.com.br,
  connect-stone.stone.com.br, conciliacao.stone.com.br, and docs.pagar.me.
